services:
  shard-db:
    image: postgres:15-alpine
    container_name: shard-db
    environment:
      POSTGRES_USER: shardadmin
      POSTGRES_PASSWORD: shardsecret
      POSTGRES_DB: shard_vault
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shardadmin -d shard_vault"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  shard-core:
    build: ./shard-core
    container_name: shard-core
    environment:
      - DB_URI=postgresql://shardadmin:shardsecret@shard-db:5432/shard_vault
      - NODE_1=http://shard-node-1:5001
      - NODE_2=http://shard-node-2:5002
      - NODE_3=http://shard-node-3:5003
      - NODE_4=http://shard-node-4:5004
      - NODE_5=http://shard-node-5:5005
    ports:
      - "8080:8080"
    depends_on:
      shard-db:
        condition: service_healthy
      node-1:
        condition: service_started
      node-2:
        condition: service_started
      node-3:
        condition: service_started
      node-4:
        condition: service_started
      node-5:
        condition: service_started
    restart: unless-stopped

  node-1:
    build: ./shard-node
    container_name: shard-node-1
    environment:
      - NODE_ID=node-1
      - PORT=5001
    ports:
      - "5001:5001"
    volumes:
      - node1_data:/data/shares

  node-2:
    build: ./shard-node
    container_name: shard-node-2
    environment:
      - NODE_ID=node-2
      - PORT=5002
    ports:
      - "5002:5002"
    volumes:
      - node2_data:/data/shares

  node-3:
    build: ./shard-node
    container_name: shard-node-3
    environment:
      - NODE_ID=node-3
      - PORT=5003
    ports:
      - "5003:5003"
    volumes:
      - node3_data:/data/shares

  node-4:
    build: ./shard-node
    container_name: shard-node-4
    environment:
      - NODE_ID=node-4
      - PORT=5004
    ports:
      - "5004:5004"
    volumes:
      - node4_data:/data/shares

  node-5:
    build: ./shard-node
    container_name: shard-node-5
    environment:
      - NODE_ID=node-5
      - PORT=5005
    ports:
      - "5005:5005"
    volumes:
      - node5_data:/data/shares

volumes:
  node1_data:
  node2_data:
  node3_data:
  node4_data:
  node5_data: